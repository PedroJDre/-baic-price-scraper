name: BAIC Price Scraper

on:
  schedule:
    # Every 4 days at 12:00 UTC (9:00 AM Argentina time, GMT-3)
    - cron: '0 12 */4 * *'
  workflow_dispatch:
    inputs:
      diagnostics:
        description: 'Only print scraper API diagnostics; do not save data or send email'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run scraper
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
          SCRAPINGANT_API_KEY: ${{ secrets.SCRAPINGANT_API_KEY }}
          ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
          CRAWLBASE_TOKEN: ${{ secrets.CRAWLBASE_TOKEN }}
          SCRAPFLY_API_KEY: ${{ secrets.SCRAPFLY_API_KEY }}
          WEBSCRAPINGAPI_KEY: ${{ secrets.WEBSCRAPINGAPI_KEY }}
          HASDATA_API_KEY: ${{ secrets.HASDATA_API_KEY }}
          SCRAPINGDOG_API_KEY: ${{ secrets.SCRAPINGDOG_API_KEY }}
          SCRAPEDO_TOKEN: ${{ secrets.SCRAPEDO_TOKEN }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          BROWSERLESS_API_KEY: ${{ secrets.BROWSERLESS_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OWN_SELLER_KEYWORDS: ${{ vars.OWN_SELLER_KEYWORDS }}
          OWN_SELLER_KEYWORDS_BAIC: ${{ vars.OWN_SELLER_KEYWORDS_BAIC }}
          OWN_SELLER_KEYWORDS_CHERY: ${{ vars.OWN_SELLER_KEYWORDS_CHERY }}
          SCRAPER_DIAGNOSTICS_ONLY: ${{ inputs.diagnostics }}
        run: python main.py

      - name: Save price history
        if: ${{ inputs.diagnostics != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices_baic.json data/prices_chery.json data/history.json docs/index.html
          git diff --staged --quiet || git commit -m "Update price history [skip ci]"
          git pull --rebase -X theirs origin main
          git push
