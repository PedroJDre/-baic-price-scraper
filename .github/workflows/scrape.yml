name: BAIC Price Scraper

on:
  schedule:
    # Monday and Thursday at 12:00 UTC (9:00 AM Argentina time, GMT-3)
    - cron: '0 12 * * 1,4'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python main.py

      - name: Save price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices_baic.json data/prices_chery.json
          git diff --staged --quiet || git commit -m "Update price history [skip ci]"
          git push
